services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: fjordvia-sqlserver
    environment:
      ACCEPT_EULA: ${ACCEPT_EULA:?Set ACCEPT_EULA=Y in a local .env file}
      MSSQL_SA_PASSWORD: ${MSSQL_SA_PASSWORD:?Set MSSQL_SA_PASSWORD in a local .env file}
    ports:
      - "1433:1433"
    volumes:
      - sqlserver-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P \"$${MSSQL_SA_PASSWORD}\" -C -Q \"SELECT 1\" || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10

volumes:
  sqlserver-data:
