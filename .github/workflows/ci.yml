name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Restore
        run: dotnet restore Fjordvia.slnx

      - name: Build
        run: dotnet build Fjordvia.slnx --configuration Release --no-restore

      - name: Test
        run: dotnet test Fjordvia.slnx --configuration Release --no-build --verbosity normal
